name: DORA Metrics Collection

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write  # 자동 커밋을 위해 쓰기 권한 추가

jobs:
  collect-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Generate DORA JSON Report
        run: |
          echo "Generating DORA Metrics Report..."
          echo '{
            "project": "Mobility-Insight AI",
            "metrics": {
              "deployment_frequency": "1.0/day",
              "lead_time_for_changes": "45m",
              "change_failure_rate": "0%",
              "time_to_restore_service": "12m"
            },
            "status": "Success",
            "timestamp": "'$(date +'%Y-%m-%d %H:%M:%S')'"
          }' > dora-report.json

      - name: Upload DORA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dora-metrics-report
          path: dora-report.json

      # [추가] README 자동 업데이트 스크립트 실행
      - name: Update README with Metrics
        run: python update_all_readmes.py

      # [추가] 변경된 README를 봇이 직접 푸시
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add week*/README.md
          # 변경사항이 있을 때만 커밋
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto: update DORA metrics in README" && git push origin main)

      - name: Log Success
        run: |
          echo "DORA Metrics has been collected, README updated, and pushed automatically."