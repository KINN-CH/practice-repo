name: Build → Test → Deploy

on:
  push:
    branches: [main]
    paths:                        # src/ 변경 시에만 배포 파이프라인 실행
      - 'src/**'
      - 'package.json'
      - 'requirements.txt'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'

jobs:
  # ── 1단계: Build ──────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js (with npm cache)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node20-${{ hashFiles('package.json') }}
          restore-keys: ${{ runner.os }}-node20-

      - name: Install dependencies
        run: npm install

      - name: Lint (ESLint)
        run: npm run lint

      - name: Package build artifact
        run: |
          mkdir -p dist
          cp -r src/ dist/src
          cp package.json dist/package.json
          echo "Build completed at $(date)" > dist/BUILD_INFO.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 7

  # ── 2단계: Test ───────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js (with npm cache)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node20-${{ hashFiles('package.json') }}
          restore-keys: ${{ runner.os }}-node20-

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: dist/

      - name: Verify artifact
        run: |
          echo "=== Build artifact contents ==="
          cat dist/BUILD_INFO.txt
          ls dist/src/

      - name: Install dependencies
        run: npm install

      - name: Run tests (Jest)
        run: npm test

  # ── 3단계: Deploy (main 브랜치 push + src 변경 시에만) ────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: dist/

      - name: Deploy (simulated)
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          echo "=== Deploying Mobility-Insight AI ==="
          echo "Branch : ${{ github.ref_name }}"
          echo "Commit : ${{ github.sha }}"
          echo "Trigger: ${{ github.event_name }}"
          ls dist/
          if [ -n "$DEPLOY_TOKEN" ]; then
            echo "Auth: token configured (masked)"
          else
            echo "Warning: DEPLOY_TOKEN secret not set"
          fi
          echo "Deployment completed at $(date)"
