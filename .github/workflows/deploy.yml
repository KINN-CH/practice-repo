name: Build → Test → Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1단계: Build ──────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Lint (ESLint)
        run: npm run lint

      - name: Package build artifact
        run: |
          mkdir -p dist
          cp -r src/ dist/src
          cp package.json dist/package.json
          echo "Build completed at $(date)" > dist/BUILD_INFO.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 7

  # ── 2단계: Test (build 완료 후 실행) ──────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build                  # build Job 성공 후에만 실행

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: dist/

      - name: Verify artifact
        run: |
          echo "=== Build artifact contents ==="
          cat dist/BUILD_INFO.txt
          ls dist/src/

      - name: Install dependencies
        run: npm install

      - name: Run tests (Jest)
        run: npm test

  # ── 3단계: Deploy (test 완료 후 실행) ─────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test                   # test Job 성공 후에만 실행
    if: github.ref == 'refs/heads/main'   # main 브랜치 push 시에만 배포

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: dist/

      - name: Deploy (simulated)
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          echo "=== Deploying Mobility-Insight AI ==="
          echo "Target: production"
          echo "Artifact:"
          ls dist/
          if [ -n "$DEPLOY_TOKEN" ]; then
            echo "Auth token: configured (hidden)"
          else
            echo "Warning: DEPLOY_TOKEN secret not set"
          fi
          echo "Deployment completed successfully at $(date)"
